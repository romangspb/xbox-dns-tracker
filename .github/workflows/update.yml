name: Update DNS Data & Deploy

on:
  schedule:
    - cron: '37 4 * * *'  # Ежедневно в 4:37 UTC
  workflow_dispatch:        # Ручной запуск
  push:
    branches: [main]       # При пуше в main — редеплой сайта
    paths-ignore:
      - 'site/data.json'   # игнорируем коммиты от самого workflow, чтобы избежать рекурсии

permissions:
  contents: write           # для коммита обновлённого site/data.json
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser + DNS check
        run: python -m src

      - name: Copy data to site
        run: cp data/data.json site/data.json

      - name: Commit updated site/data.json (for Vercel auto-deploy)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet site/data.json; then
            git add site/data.json
            git commit -m "Update data.json [skip ci]"
            git push
          else
            echo "site/data.json unchanged, nothing to commit"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
